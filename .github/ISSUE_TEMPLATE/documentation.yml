name: Documentation
description: Report missing, outdated, or incorrect backend documentation
title: "[Docs]: "
labels: ["documentation", "backend"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve backend documentation.

  - type: textarea
    id: what
    attributes:
      label: What Needs Documenting
      description: Describe what documentation is missing, incorrect, or needs updating.
    validations:
      required: true

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Issue Type
      options:
        - Missing documentation
        - Outdated documentation
        - Incorrect documentation
        - Unclear / confusing documentation
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Content
      description: If you have a suggestion for what the documentation should say, include it here.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links to related docs, code, or discussions.
