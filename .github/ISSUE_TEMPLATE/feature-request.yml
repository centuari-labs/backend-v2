name: Feature Request
description: Suggest a new feature for the Backend API service
title: "[Feature]: "
labels: ["enhancement", "backend"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature? Fill out the form below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - Nice to have
        - Important
        - Critical / Blocker
    validations:
      required: true

  - type: checkboxes
    id: breaking
    attributes:
      label: Breaking Changes
      options:
        - label: This feature may introduce breaking changes to existing APIs

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any mockups, references, or additional context.
